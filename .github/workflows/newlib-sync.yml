name: Sync Newlib Mirror
on:
  schedule:
    - cron: '0 4 * * *' # 4 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Git Data
        run: |
          git clone --mirror https://sourceware.org/git/newlib-cygwin.git upstream
          cd upstream
          git push --mirror https://x-access-token:${{ secrets.NEWLIB_SYNC_PAT }}@github.com/${{ github.repository_owner }}/newlib-git-mirror.git
