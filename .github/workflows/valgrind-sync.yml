name: Sync Valgrind
on:
  schedule:
    - cron: '5 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Git Data
        run: |
          git clone --mirror https://sourceware.org/git/valgrind.git upstream
          cd upstream
          git push --mirror https://x-access-token:${{ secrets.MIRROR_SYNC_PAT }}@github.com/${{ github.repository_owner }}/valgrind-git-mirror.git
