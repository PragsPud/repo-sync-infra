name: Sync elfutils Mirror
on:
  schedule:
    - cron: '0 4 * * *' # 4 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Git Data
        run: |
          git clone --mirror https://sourceware.org/git/elfutils.git upstream
          cd upstream
          git push --mirror https://x-access-token:${{ secrets.ELFUTILS_SYNC_PAT }}@github.com/${{ github.repository_owner }}/elfutils-git-mirror.git
